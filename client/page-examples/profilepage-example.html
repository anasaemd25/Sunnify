<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
    <link rel="stylesheet" href="./../css/profile.css">
    <link rel="stylesheet" href="./../css/style.css">
</head>
<body>
    <div class="profile-page-example">
        <div class="header">
            <div class="header-item" id="logo"></div>
            <div class="header-item" id="sell"></div>
            <div class="header-item" id="auth"></div>
        </div>

        <div class="profile-content">

            <div class="profile-card">
                <div class="profile-image"></div>
                <div class="profile-info">
                    <div class="profile-item" id="profile-name">User Name</div>
                    <div class="profile-item" id="profile-rating">Rating: 4.5/5</div>
                    <div class="profile-item" id="profile-location">Location: Tuira</div>
                    <div class="profile-item" id="member-since">Member since: Jan 2020</div>
                    <div class="edit-profile-btn">Edit Profile</div>
                </div>
            </div>
            
            <div class="profile-menu">
                <div class="menu-item" id="saved-items-btn">Saved items</div>
                <div class="menu-item" id="reviews-btn">Reviews</div>
                <div class="menu-item" id="listings-btn">Listings</div>
                <div class="menu-item" id="settings-btn">Settings</div>
            </div>

            <div class="posts" id="saved_items">
                <div class="post">post1<!-- like post in main page (without buttons) + status + date --></div>
                <div class="post">post2</div>
                <div class="post">post3</div>

                <div class="show-more-btn">Show more</div>
            </div>

            <div class="profile-reviews">
                <div class="review">review1<!-- img + text + rating + date --></div>
                <div class="review">review2</div>

                <div class="show-more-btn">Show more</div>
            </div>
        </div>
            <div class="posts" id="listings">
                <div class="post">post1</div>
                <div class="post">post2</div>
                <div class="post">post3</div>

                <div class="show-more-btn">Show more</div>
            </div>

        <div class="footer">
            <div class="footer-logo"></div>
            <div class="footer-content">© 2026 Sunnify. All rights reserved.</div>
        </div>
    </div>
</body>
</html>
