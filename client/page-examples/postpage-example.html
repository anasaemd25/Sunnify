<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post</title>
    <link rel="stylesheet" href="./../css/post.css">
    <link rel="stylesheet" href="./../css/style.css">
</head>
<body>
    <div class="post-page-example">
        <div class="header">
            <div class="logo"></div>
            <div class="sell"></div>
            <div class="auth"></div>
        </div>
        
        <div class="post-content">
            <div class="post-gallery">
                <div class="main-image">img</div>

                <div class="image-thumbnails">
                    <div class="thumbnail"></div>
                    <div class="thumbnail"></div>
                    <div class="thumbnail"></div>
                </div>
            </div>
        
            <div class="post-details">
                <div class="post-name">Post Name</div>
                <div class="post-category">Category</div>
                <div class="post-price">$99.99</div>
                <div class="post-location">Location: Tuira</div>
                <div class="button-section">
                    <div class="save-btn">save-btn</div>
                    <div class="contact-btn">chat-btn</div>
            </div>
            </div>
        </div>

        <div class="post-description">
            <div class="description-title">Description</div>
            <div class="description-content">Blabla.</div>
            <!-- we can add condition as variable -->
        </div>

        <div class="seller-info">
            <div class="seller-name">Seller Name</div>
            <div class="seller-rating">Rating: 4.5/5</div>
            <div class="seller-location">Location: Tuira</div>
            <div class="seller-profile-link">View Profile</div>
        </div>

        <div class="footer">
            <div class="footer-logo"></div>
            <div class="footer-content">© 2026 Sunnify. All rights reserved.</div>
        </div>
    </div>
</body>
</html>
