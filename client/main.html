<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sunnify</title>
</head>
<body>
    <div class ="main-page">
    
        <div class="header">
            <div class="logo"></div>
            <div class="auth"></div>
        </div>

        <div class="search-section">
            <div class="search-bar"></div>
            <div class="search-location"></div>
            <div class="search-button"></div>
        </div>

        <div class="categories-section">
            <div class="categories-title">Categories</div>
            <div class="categories-list">
                <div class="category-item">Category 1</div>
                <div class="category-item">Category 2</div>
                <div class="category-item">Category 3</div>
            </div>
        </div>

        <div class="post-section">
            <!-- post example -->
            <div class="post-item">
                <div class="post-image"></div>
                <div class="post-name"></div>
                <div class="price"></div>
                <div class="location"></div>
                <div class="post-preview-btn"></div>
            </div>
            
            <div class="load-more">Load More</div>
        </div>

        <div class="footer">
            <div class="footer-logo"></div>
            <div class="footer-content">© 2026 Sunnify. All rights reserved.</div>
        </div>

    </div>
</body>
</html>
