<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sunnify</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/main.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" integrity="sha384-tViUnnbYAV00FLIhhi3v/dWt3Jxw4gZQcNoSCxCIFNJVCx7/D55/wXsrNIRANwdD" crossorigin="anonymous">
</head>
<body>
    <div class ="main-page">
    
        <div class="header">
            <div class="logo">logo</div>
            <div class="sell">sell</div>
            <div class="auth">Login</div>
        </div>

        <div class="search-section">
            <div class="search-bar">Search</div>
            <div class="search-location"></div>
            <div class="search-button"></div>
        </div>

        <div id="categories-section">
            <div id="categories-title">Categories</div>
            <div id="categories-list">
                <div class="category-item">Category 1</div>
                <div class="category-item">Category 2</div>
                <div class="category-item">Category 3</div>
            </div>
        </div>

        <div class="post-section">
            <!-- post example -->
            <div class="post-item">
                <div class="post-image"></div>
                <div class="post-name">Flops</div>
                <div class="price">10.00</div>
                <div class="location">Oulu, Tuira</div>
                <div class="save-btn">Save</div>
            </div>

            <div class="post-item">
                <div class="post-image"></div>
                <div class="post-name">Fishing Rod</div>
                <div class="price">35.00</div>
                <div class="location">Oulu, Kaukovaino</div>
                <div class="save-btn">Save</div>
            </div>
            
            <div id="load-more">Load More</div>
        </div>

        <div class="footer">
            <div class="footer-logo"></div>
            <div class="footer-content">© 2026 Sunnify. All rights reserved.</div>
        </div>

    </div>
</body>
</html>
