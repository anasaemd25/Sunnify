<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sunnify</title>
    <link rel="stylesheet" href="../../css/style.css">
    <link rel="stylesheet" href="../../css/main.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" integrity="sha384-tViUnnbYAV00FLIhhi3v/dWt3Jxw4gZQcNoSCxCIFNJVCx7/D55/wXsrNIRANwdD" crossorigin="anonymous">

<body>
    <main class="main-page">
        <!-- Responsive Navbar -->
        <nav class="navbar navbar-expand-lg navbar-light bg-light">
            <div class="container">
                <a class="navbar-brand" href="#">Sunnify</a>

                <div class="ms-auto">
                    <a id="login-logout-btn" href="./login.html" class="btn btn-outline-primary">Login</a>
                </div>
            </div>
        </nav>
        <!-- Responsive Search Section -->
        <section class="search py-4 bg-secondary">
            <div class="container">

                <form class="d-flex gap-2 justify-content-center">
                    <input class="form-control" type="text" placeholder="Search">
                    <input class="form-control" type="text" placeholder="Location">
                    <button class="btn btn-primary">Go</button>
                </form>

            </div>
        </section>

        <!-- Responsive Categories Section -->
        <section class="categories py-4">
            <div class="container">
                <h2 class="text-center mb-4">Categories</h2>
                <div class="row g-3">
                    <div class="col-4 text-center">
                        <button class="category-item btn btn-light w-100 py-3 shadow-sm">
                            Category 1
                        </button>
                        <p class="mt-2 fw-semibold">Category 1</p>
                    </div>
                    <div class="col-4 text-center">

                    </div>

                </div>
            </div>
        </section>

        <!-- Responsive Posts Section -->
        <section class="posts py-4">
            <div class="container">
                <div class="row g-4">
                    <!-- Post Card 1 -->
                    <div class="col-6 col-md-6 col-lg-4">
                        <div class="card h-100 shadow-sm">
                            <div class="bg-secondary" style="height: 200px;"></div>

                            <div class="card-body">
                                <h5 class="card-title">Flops</h5>
                                <p class="text-muted">Oulu, Tuira</p>
                            </div>

                            <div class="card-footer d-flex justify-content-between align-items-center">
                                <span class="fw-bold">$10.00</span>
                                <button class="btn btn-outline-danger btn-sm">
                                    <i class="bi bi-heart"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                    <!-- Post Card 2 -->
                    <div class="col-6 col-md-6 col-lg-4">
                        <div class="card h-100 shadow-sm">
                            <div class="bg-secondary" style="height: 200px;"></div>

                            <div class="card-body">
                                <h5 class="card-title">Flops</h5>
                                <p class="text-muted">Oulu, Tuira</p>

                            </div>
                        </div>
                    </div>
                    <!-- Post Card 3 -->
                    <div class="col-6 col-md-6 col-lg-4">
                        <div class="card h-100 shadow-sm">
                            <div class="bg-secondary" style="height: 200px;"></div>

                            <div class="card-body">
                                <h5 class="card-title">Flops</h5>
                                <p class="text-muted">Oulu, Tuira</p>
                            </div>

                            <div class="card-footer d-flex justify-content-between align-items-center">
                                <span class="fw-bold">$10.00</span>

                                    <i class="bi bi-heart"></i>

                    </div>

                    <div class="col-6 col-md-6 col-lg-4">

                            <div class="card-body">
                                <h5 class="card-title">Flops</h5>
                                <p class="text-muted">Oulu, Tuira</p>

                                <button class="btn btn-outline-danger btn-sm">
                                    <i class="bi bi-heart"></i>
                                </button>
                            </div>
                        </div>
                    </div>

                </div>
                <div class="text-center mt-4">
                    <button class="btn btn-secondary">Load More</button>
                </div>
            </div>
        </section>

        <!-- Responsive Footer -->
        <div id="footer"></div>
    </main>

    <!-- Bootstrap JS (required for navbar toggle and other interactive components) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-0pUGZvbkm6XF6gxjEnlmuGrJXVbNuzT9qBBavbLwCsOGabYfZo0T0to5eqruptLy" crossorigin="anonymous"></script>
    <script type="module" src="/tech-examples/reusable-html/demo2.js"></script>
